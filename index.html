	<script>
		new WOW().init();
		
		// Lenis Smooth Scroll
		const lenis = new Lenis({ duration: 1.5 });
		function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
		requestAnimationFrame(raf);

		document.addEventListener('DOMContentLoaded', function() {
			// Footer Reveal Logic
			const footer = document.querySelector('.site-footer');
			const mainWrapper = document.querySelector('.main-content-wrapper');
			function adjustFooterReveal() {
				if (!footer || !mainWrapper) return;
				const h = footer.offsetHeight;
				if (window.innerWidth < 992) {
					footer.style.position = 'relative';
					footer.style.visibility = 'visible';
					mainWrapper.style.marginBottom = '0';
				} else {
					footer.style.position = 'fixed';
					footer.style.visibility = 'visible';
					mainWrapper.style.marginBottom = h + 'px';
				}
			}
			adjustFooterReveal();
			window.addEventListener('resize', adjustFooterReveal);

			// Hero Slider Init
			// ── Hero Slideshow (simple, no Swiper) ──
                                        var heroSlides = [
                                            { h1: 'Advanced Data & AI Solutions Tailored to Your Needs', h3: 'Data. Intelligence. Engineered.', btn: 'Get Started', href: 'about.html', target: '', img: 'about hero.png' },
                                            { h1: 'Real-Time Edge Intelligence for a Smarter World', h3: 'Process. Analyze. Act — at the Edge.', btn: 'Explore EdgeData', href: 'https://edgedata360.com', target: '_blank', img: 'ed logo.png' },
                                            { h1: 'Autonomous Ecosystem. Intelligent Infrastructure at Scale.', h3: 'Reimagining Property Intelligence for Regulated Industries.', btn: 'Discover Valucore', href: 'https://valutek.ai', target: '_blank', img: 'vt logo.png' }
                                        ];
                                        var heroIndex = 0;
                                        var heroTimer;

                                        function showHeroSlide(idx) {
                                            heroIndex = idx % heroSlides.length;
                                            var s = heroSlides[heroIndex];
                                            var h1 = document.getElementById('hero-h1');
                                            var h3 = document.getElementById('hero-h3');
                                            var cta = document.getElementById('hero-cta');
                                            var img = document.getElementById('hero-img');
                                            var btn = document.getElementById('hero-btn');

                                            // Fade out ALL at same time
                                            h1.style.opacity = '0';
                                            h3.style.opacity = '0';
                                            cta.style.opacity = '0';
                                            img.style.opacity = '0';
                                            img.style.transform = 'scale(0.95)';

                                            setTimeout(function() {
                                                h1.textContent = s.h1;
                                                h3.textContent = s.h3;
                                                btn.textContent = s.btn;
                                                btn.href = s.href;
                                                btn.target = s.target;
                                                img.src = s.img;

                                                // Fade in ALL at same time
                                                img.style.opacity = '1';
                                                img.style.transform = 'scale(1)';
                                                h1.style.opacity = '1';
                                                h3.style.opacity = '1';
                                                cta.style.opacity = '1';
                                            }, 500);

                                            // Update dots
                                            document.querySelectorAll('.hero-dot').forEach(function(d, i) {
                                                d.style.background = i === heroIndex ? '#EF7F1A' : '#ccc';
                                                d.style.width = i === heroIndex ? '32px' : '12px';
                                                d.style.borderRadius = i === heroIndex ? '6px' : '50%';
                                            });
                                        }

                                        function startHeroTimer() {
                                            heroTimer = setInterval(function() { showHeroSlide(heroIndex + 1); }, 5000);
                                        }

                                        // Dot clicks
                                        document.querySelectorAll('.hero-dot').forEach(function(dot) {
                                            dot.addEventListener('click', function() {
                                                clearInterval(heroTimer);
                                                showHeroSlide(parseInt(this.getAttribute('data-slide')));
                                                startHeroTimer();
                                            });
                                        });

                        // Custom Cursor Track
			document.addEventListener('mousemove', (e) => {
				const cursor = document.querySelector('.cursor-follower');
				if(cursor) { cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px'; }
			});
		});

		// Modal Logic
		function openEnquireModal(e) { if(e) e.preventDefault(); document.getElementById('enquire-modal').classList.add('active'); document.body.style.overflow = 'hidden'; }
		function closeEnquireModal() { document.getElementById('enquire-modal').classList.remove('active'); document.body.style.overflow = ''; }
	</script>


        <!-- Blogger Dynamic Integration for Landing Page -->
	<script>
	document.addEventListener("DOMContentLoaded", function() {
		$.getJSON('https://sunwaretechnologies.blogspot.com/feeds/posts/default?alt=json-in-script&callback=?', function(data) {
			var entries = data.feed.entry || [];
			var html = '';

			if (entries.length === 0) {
				$('#blogger-landing-posts').html('<div class="swiper-slide text-center"><p>No articles found.</p></div>');
				return;
			}

			entries.forEach(function(entry, index) {
				var title = entry.title.$t;
				var link = entry.link.find(l => l.rel === 'alternate').href;
				
				// Extract Thumbnail - Prioritize content images for higher quality
				var thumb = "assets/img/blog/blog-1.jpg"; // fallback
				if (entry.content && entry.content.$t.includes('<img')) {
					var match = entry.content.$t.match(/<img[^>]+src="([^">]+)"/);
					if (match) thumb = match[1];
				} else if (entry.media$thumbnail) {
					thumb = entry.media$thumbnail.url;
				}
				// Robustly upgrade quality (works for s* and w* patterns)
				thumb = thumb.replace(/\/s[0-9]+.*?\/|\/w[0-9]+.*?\//, '/s1600/');

				html += `
				<div class="blog__one-item swiper-slide">
					<div class="blog__one-item-image" style="margin-bottom: 25px;">
						<a href="blog-details.html?post=${encodeURIComponent(link)}"><img src="${thumb}" alt="${title}" style="height:250px;width:100%;object-fit:cover;border-radius:16px;"></a>
					</div>
					<div class="blog__one-item-content">                
						<h5><a href="blog-details.html?post=${encodeURIComponent(link)}">${title}</a></h5>
						<a class="more_btn" href="blog-details.html?post=${encodeURIComponent(link)}">Read More<i class="flaticon flaticon-right-up"></i></a>
					</div>
				</div>`;
			});

			$('#blogger-landing-posts').html(html);

			// Re-initialize Swiper for the slider accurately
			setTimeout(function() {
				if (typeof Swiper !== 'undefined') {
					new Swiper('.blog_slider', {
						slidesPerView: 3,
						spaceBetween: 30,
						loop: true,
						speed: 1000,
						pagination: {
							el: '.blog-pagination',
							clickable: true,
						},
						breakpoints: {
							320: { slidesPerView: 1 },
							768: { slidesPerView: 2 },
							1200: { slidesPerView: 3 }
						}
					});
				}
			}, 500);

		}).fail(function() {
			$('#blogger-landing-posts').html('<div class="swiper-slide text-center"><p>Failed to load articles.</p></div>');
		});
	});
	</script>
